<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <radialGradient id="btnBg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#C8894A"/>
      <stop offset="100%" style="stop-color:#4A2210"/>
    </radialGradient>

    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1A0E"/>
      <stop offset="50%" style="stop-color:#6B3A1F"/>
      <stop offset="100%" style="stop-color:#2C1A0E"/>
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843"/>
      <stop offset="50%" style="stop-color:#F0C96A"/>
      <stop offset="100%" style="stop-color:#D4A843"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a0a02" flood-opacity="0.55"/>
    </filter>

    <filter id="arrowGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer dark ring -->
  <circle cx="30" cy="30" r="29" fill="url(#ring)" filter="url(#shadow)"/>

  <!-- Gold border -->
  <circle cx="30" cy="30" r="27.5" fill="none" stroke="url(#gold)" stroke-width="1.2"/>

  <!-- Inner warm brown fill -->
  <circle cx="30" cy="30" r="25.5" fill="url(#btnBg)"/>

  <!-- Dashed inner border -->
  <circle cx="30" cy="30" r="23" fill="none" stroke="url(#gold)" stroke-width="0.8" stroke-dasharray="4 2.5" opacity="0.7"/>

  <!-- Arrow up — bold, centered -->
  <path d="M30 13 L19 26 L24.5 26 L24.5 42 L35.5 42 L35.5 26 L41 26 Z"
        fill="url(#gold)" filter="url(#arrowGlow)"/>
</svg>
